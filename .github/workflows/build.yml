name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build --base=./ || npm run build || true
          mkdir -p dist
          cp index.html dist/ 2>/dev/null || true

      - name: Setup Capacitor and Icons
        run: |
          # প্রয়োজনীয় প্যাকেজ ইনস্টল
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # আপনার দেওয়া অ্যাপের নাম ও আইডি দিয়ে কনফিগারেশন তৈরি
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec.aoo",
            "appName": "EidAdda",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF

          # আইকন জেনারেট করা
          npx capacitor-assets generate --android

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          # গ্র্যাডল কনফিগারেশন ঠিক করা
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EidAdda-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
